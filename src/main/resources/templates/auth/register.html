<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | ShopEasy Premium</title>

<!-- Bootstrap 5 CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<!-- Google Font: Poppins -->
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
	rel="stylesheet">
<!-- Bootstrap Icons -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<link rel="stylesheet" th:href="@{/css/auth/register.css}">

</head>
<body>

	<div class="message-overlay" id="statusOverlay">
		<div class="message-circle" id="statusCircle">
			<i id="statusIcon"></i>
			<h4 id="statusTitle"></h4>
			<p id="statusDesc"></p>
		</div>
	</div>

	<div class="bg-glow-container">
		<div class="blob blob-1"></div>
		<div class="blob blob-2"></div>
	</div>

	<div class="main-wrapper">
		<div class="branding-section">
			<div class="logo-text">ShopEasy</div>
			<p class="fs-5 opacity-75 mb-4">Smarter Shopping, Premium
				Experience.</p>
			<div class="feature-item">
				<i class="bi bi-patch-check-fill text-info"></i> <span
					class="small fw-600">Exclusive Member Deals</span>
			</div>
			<div class="feature-item">
				<i class="bi bi-truck text-warning"></i> <span class="small fw-600">Free
					India-wide Delivery</span>
			</div>
			<div class="feature-item">
				<i class="bi bi-shield-lock-fill text-success"></i> <span
					class="small fw-600">Secure Payments</span>
			</div>
		</div>

		<div class="form-section">
			<div class="register-card">
				<div class="logo-mobile d-none">
					<h2 class="logo-text text-center mb-1" style="font-size: 2.2rem;">ShopEasy</h2>
					<p class="text-center text-muted small mb-4">India's Premium
						Mall</p>
				</div>

				<div class="trust-badge">
					<i class="bi bi-shield-fill-check"></i> 100% Secure Sign Up
				</div>

				<div class="header-flex">
					<div>
						<h3 class="fw-800 mb-0" style="font-size: 1.5rem;">Create
							Account 🚀</h3>
						<p class="text-muted small mb-0">Join our premium community
							today.</p>
					</div>
					<div class="profile-preview-circle" id="profilePreview">
						<i class="bi bi-camera-fill" style="font-size: 1.5rem;"></i> <img
							id="previewImg" src="" alt="" style="display: none;">
					</div>
				</div>

				<form id="regForm">
					<div class="row g-2">
						<div class="col-12">
							<div class="input-group-custom">
								<i class="bi bi-person field-icon"></i> <input type="text"
									id="fullname" name="fullname" class="form-control-custom"
									placeholder="Full Name" required>
							</div>
						</div>
						<div class="col-md-6">
							<div class="input-group-custom">
								<i class="bi bi-envelope field-icon"></i> <input type="email"
									id="email" name="email" class="form-control-custom"
									placeholder="Email Address" required>
							</div>
						</div>
						<div class="col-md-6">
							<div class="input-group-custom">
								<i class="bi bi-phone field-icon"></i> <input type="tel"
									id="phone" name="phoneNumber" class="form-control-custom"
									placeholder="Mobile (+91)" required>
							</div>
						</div>
						<div class="col-12">
							<div class="gender-group">
								<div class="gender-box">
									<input type="radio" name="gender" id="m" value="MALE" checked>
									<label class="gender-label" for="m">Male</label>
								</div>
								<div class="gender-box">
									<input type="radio" name="gender" id="f" value="FEMALE">
									<label class="gender-label" for="f">Female</label>
								</div>
								<div class="gender-box">
									<input type="radio" name="gender" id="o" value="OTHER">
									<label class="gender-label" for="o">Other</label>
								</div>
							</div>
						</div>
						<div class="col-md-6">
							<div class="input-group-custom">
								<i class="bi bi-lock field-icon"></i> <input type="password"
									class="form-control-custom" id="pass1" name="password"
									placeholder="Password" required>
								<button type="button" class="password-toggle"
									onclick="togglePass('pass1', 'eye1')">
									<i class="bi bi-eye-fill" id="eye1"></i>
								</button>
							</div>
						</div>
						<div class="col-md-6">
							<div class="input-group-custom">
								<i class="bi bi-shield-lock field-icon"></i> <input
									type="password" class="form-control-custom" id="pass2"
									name="confirmPassword" placeholder="Confirm" required>
								<button type="button" class="password-toggle"
									onclick="togglePass('pass2', 'eye2')">
									<i class="bi bi-eye-fill" id="eye2"></i>
								</button>
							</div>
						</div>

						<!-- NEW: Choose Image row made compact -->
						<div class="col-12">
							<div class="input-group-custom">
								<i class="bi bi-image field-icon"></i> <input type="file"
									class="form-control-custom" id="profileInput"
									name="profileImage" accept="image/*" style="padding-top: 10px;">
							</div>
						</div>
					</div>

					<div class="form-check mb-3">
						<input class="form-check-input" type="checkbox" id="terms"
							required> <label
							class="form-check-label text-muted small" for="terms"> I
							agree to <a href="#"
							class="text-primary text-decoration-none fw-600">Terms</a>
						</label>
					</div>

					<button type="submit" class="btn btn-register">Create
						Account</button>
				</form>

				<div class="row g-2 mt-3">
					<div class="col-6">
						<button type="button" class="btn btn-social"
							onclick="googleLogin()">
							<img
								src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
								width="16"> Google
						</button>
					</div>
					<div class="col-6">
						<button type="button" class="btn btn-social"
							onclick="facebookLogin()">
							<i class="bi bi-facebook text-primary fs-6"></i> Facebook
						</button>
					</div>
				</div>

				<p class="text-center mt-3 mb-0 small text-muted">
					Already a member? <a href="/auth/login"
						class="text-primary fw-700 text-decoration-none"> Login </a>
				</p>
			</div>
		</div>
	</div>

	<script th:src="@{/js/auth/register.js}" type="text/javascript"></script>
</body>
</html>
